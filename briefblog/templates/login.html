<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - BriefBlog</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f9f9f9;
            font-family: "Roboto", "Segoe UI", Arial, sans-serif;
            color: #0f0f0f;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            background: white;
            padding: 50px 40px;
            width: 380px;
            border-radius: 14px;
            border: 1px solid #e5e5e5;
            text-align: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #606060;
            font-size: 14px;
            margin-bottom: 40px;
        }

        form p {
            margin-bottom: 25px;
            text-align: left;
        }

        form label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        input {
            width: 100%;
            border: none;
            border-bottom: 1px solid #ccc;
            padding: 6px 0;
            font-size: 16px;
            font-family: inherit;
            background: transparent;
            outline: none;
            transition: border-bottom 0.2s;
        }

        input:focus {
            border-bottom: 2px solid #111;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border-radius: 25px; /* Капсульная кнопка */
            border: none;
            background: #111;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background: #333;
        }

        .footer-link {
            margin-top: 25px;
            font-size: 14px;
            color: #606060;
        }

        .footer-link a {
            text-decoration: none;
            color: #111;
            font-weight: 600;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">BriefBlog</div>
    <div class="subtitle">Welcome back 👋</div>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>

    <div class="footer-link">
        Don’t have an account?
        <a href="{% url 'signup' %}">Sign Up</a>
    </div>
</div>

</body>
</html>
